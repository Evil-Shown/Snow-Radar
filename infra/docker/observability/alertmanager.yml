global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@snowradar.app'
  smtp_auth_username: 'alerts@snowradar.app'
  smtp_auth_password: '${SMTP_PASSWORD}'

route:
  group_by: ['alertname', 'server', 'provider']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default'
    email_configs:
      - to: 'admin@snowradar.app'
        send_resolved: true
    webhook_configs:
      - url: 'https://discord.com/api/webhooks/${DISCORD_WEBHOOK_ID}/${DISCORD_WEBHOOK_TOKEN}'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@snowradar.app, oncall@snowradar.app'
        send_resolved: true
    webhook_configs:
      - url: 'https://discord.com/api/webhooks/${DISCORD_WEBHOOK_ID}/${DISCORD_WEBHOOK_TOKEN}'
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@snowradar.app'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']