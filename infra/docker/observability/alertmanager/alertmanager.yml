global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'server', 'provider']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

receivers:
  - name: 'default'
    email_configs:
      - to: 'alerts@snowradar.app'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#snowradar-alerts'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'critical@snowradar.app'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#snowradar-critical'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'server', 'provider']